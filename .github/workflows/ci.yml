name: CI

on:
  push:
    # feat/webui 是长期分支：不进 CI 会让回归潜伏到合并 master 时才爆
    branches: [main, master, feat/webui]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 最小权限:CI 只需读取仓库内容
permissions:
  contents: read

# 同一分支/PR 的新提交取消正在进行的旧运行,节省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Type check
        run: pixi run typecheck

      # 单遍并行:coverage 任务即全量 pytest(-n auto + pytest-cov),测试失败即红。
      # 旧流程 Test 与 Coverage 各跑一遍全量(3m49+4m56),合并后约省一半时长。
      - name: Test + Coverage
        run: pixi run coverage
