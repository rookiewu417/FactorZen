name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 最小权限:CI 只需读取仓库内容
permissions:
  contents: read

# 同一分支/PR 的新提交取消正在进行的旧运行,节省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Type check
        run: pixi run typecheck

      - name: Test
        run: pixi run test

      - name: Coverage
        run: pixi run coverage
