<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" aria-labelledby="title desc" viewBox="0 0 640 220">
  <title id="title">FactorZen horizontal logo light</title>
  <desc id="desc">Light-background FactorZen wordmark with a minimal factor grid mark.</desc>
  <style>
    .frame{fill:none;stroke:#11161a;stroke-width:6;stroke-linejoin:round}
    .solid{fill:#11161a}
    .soft{fill:#11161a;opacity:.3}
    .accent{fill:#3e8f66}
    .word{font-family:&quot;Aptos Display&quot;,&quot;Aptos&quot;,&quot;Segoe UI&quot;,&quot;Noto Sans SC&quot;,sans-serif;font-size:78px;font-weight:760;letter-spacing:0}
  </style>
  <g transform="translate(42 46) scale(1.9)">
    <rect class="frame" x="14" y="14" width="52" height="52" rx="10"/>
    <circle class="solid" cx="30" cy="30" r="5"/>
    <circle class="soft" cx="50" cy="30" r="5"/>
    <circle class="soft" cx="30" cy="50" r="5"/>
    <circle class="accent" cx="50" cy="50" r="5"/>
  </g>
  <text class="word" x="210" y="136" fill="#11161a">FactorZen</text>
</svg>
