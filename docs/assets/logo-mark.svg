<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" aria-labelledby="title desc" viewBox="0 0 512 512">
  <title id="title">FactorZen factor grid logo mark</title>
  <desc id="desc">A minimal two-by-two factor grid with one green selected signal point.</desc>
  <style>
    .frame{fill:none;stroke:#11161a;stroke-width:36;stroke-linejoin:round}
