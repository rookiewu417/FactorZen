  </style>
  <rect class="frame" x="118" y="118" width="276" height="276" rx="54"/>
  <circle class="solid" cx="206" cy="206" r="28"/>
  <circle class="soft" cx="306" cy="206" r="28"/>
  <circle class="soft" cx="206" cy="306" r="28"/>
  <circle class="accent" cx="306" cy="306" r="28"/>
</svg>
