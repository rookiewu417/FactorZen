[workspace]
authors = ["rookiewu417 <1007372080@qq.com>"]
channels = ["conda-forge"]
name = "FactorZen"
platforms = ["win-64", "linux-64"]
version = "0.3.0"

[tasks]
lint       = "ruff check ."
format     = "ruff format ."
test       = "pytest tests/ -v"
typecheck  = "mypy --cache-dir .cache/mypy --no-sqlite-cache"
coverage   = "python tools/run_coverage.py"
lab        = "jupyter lab"
smoke      = "python -c \"import polars; import tushare; print('ok')\""
smoke-data = "python tools/smoke_data.py"
daily      = "python -m factorzen.pipelines.daily_single"
report     = "python -m factorzen.pipelines.generate_report"
fz         = "python -m factorzen.cli.main"

[dependencies]
python = ">=3.10,<3.13"

[pypi-dependencies]
polars       = ">=1.0.0"
pyarrow      = ">=14.0.0"
tushare      = ">=1.4.0"
pandas       = ">=2.0.0"
numpy        = ">=1.24.0"
scipy        = ">=1.11.0"
cvxpy        = ">=1.4"
optuna       = ">=3.5"
statsmodels  = ">=0.14.0"
matplotlib   = ">=3.7.0"
jinja2       = ">=3.1.0"
factorzen = { path = ".", editable = true }
pydantic         = ">=2.5"
joblib           = ">=1.3"
pyyaml           = ">=6.0"
pyqlib           = ">=0.9.7"
protobuf         = "<5"
setuptools       = ">=69,<81"
ccxt = ">=4.2"

[feature.dev.pypi-dependencies]
pytest     = ">=7.0.0"
coverage   = ">=7.4.0"
ruff       = ">=0.3.0"
mypy       = ">=1.9.0"
jupyterlab = ">=4.0.0"

[environments]
default = { features = ["dev"], solve-group = "default" }
